<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>anthonyhappens</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
          sans-serif;
        background: #0f1115;
        color: #e6e8eb;
        line-height: 1.6;
      }
      main {
        width: 100%;
        max-width: 36rem;
        padding: 2.5rem 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.25rem;
        letter-spacing: 0.01em;
      }
      p.sub {
        margin: 0 0 2rem;
        color: #9aa0a6;
        font-size: 0.95rem;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 0.75rem;
      }
      a.card {
        display: block;
        padding: 1rem 1.25rem;
        border-radius: 0.75rem;
        background: #1a1d23;
        color: inherit;
        text-decoration: none;
        border: 1px solid #262a31;
        transition:
          border-color 0.15s ease,
          transform 0.15s ease;
      }
      a.card:hover {
        border-color: #4a90d9;
        transform: translateY(-1px);
      }
      .name {
        font-weight: 600;
      }
      .desc {
        color: #9aa0a6;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>anthonyhappens</h1>
      <p class="sub">site map</p>
      <ul>
        <li>
          <a class="card" href="/docusaurus/"
            ><span class="name">docusaurus</span><br /><span class="desc"
              >文件與 blog 站</span
            ></a
          >
        </li>
        <li>
          <a class="card" href="/twstock-radar/"
            ><span class="name">twstock-radar</span><br /><span class="desc"
              >台股每日收盤雷達</span
            ></a
          >
        </li>
      </ul>
    </main>
  </body>
</html>
